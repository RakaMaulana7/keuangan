<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransaksiKu – Login</title>
  <meta name="description" content="Login atau daftar ke TransaksiKu untuk mengelola transaksi keuangan Anda." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="auth-container">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="brand-logo">
        <i data-lucide="credit-card"></i>
      </div>
      <h1>TransaksiKu</h1>
      <p>Kelola keuangan Anda dengan cerdas</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">
          <i data-lucide="log-in"></i> Masuk
        </button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">
          <i data-lucide="user-plus"></i> Daftar
        </button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="mail"></i></span>
            <input type="email" id="loginEmail" placeholder="email@contoh.com" required autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label for="loginPassword">Kata Sandi</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="lock"></i></span>
            <input type="password" id="loginPassword" placeholder="Masukkan kata sandi" required autocomplete="current-password" />
            <button type="button" class="toggle-pw" id="toggleLoginPw" title="Tampilkan/Sembunyikan">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>
        <div id="loginError" class="auth-error" style="display:none"></div>
        <button type="submit" class="btn-auth" id="loginBtn">
          <i data-lucide="log-in"></i>
          <span>Masuk</span>
        </button>
        <p class="auth-hint">Belum punya akun? <a href="#" onclick="switchTab('register')">Daftar sekarang</a></p>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="auth-form" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="regName">Nama Lengkap</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="user"></i></span>
            <input type="text" id="regName" placeholder="Nama Anda" required autocomplete="name" />
          </div>
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="mail"></i></span>
            <input type="email" id="regEmail" placeholder="email@contoh.com" required autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label for="regPassword">Kata Sandi</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="lock"></i></span>
            <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password" />
            <button type="button" class="toggle-pw" id="toggleRegPw" title="Tampilkan/Sembunyikan">
              <i data-lucide="eye"></i>
            </button>
          </div>
          <div class="pw-strength" id="pwStrength" style="display:none">
            <div class="pw-bar"><div class="pw-fill" id="pwFill"></div></div>
            <span id="pwLabel" class="pw-label"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="regConfirm">Konfirmasi Kata Sandi</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="shield-check"></i></span>
            <input type="password" id="regConfirm" placeholder="Ulangi kata sandi" required autocomplete="new-password" />
          </div>
        </div>
        <div id="registerError" class="auth-error" style="display:none"></div>
        <div id="registerSuccess" class="auth-success" style="display:none"></div>
        <button type="submit" class="btn-auth" id="registerBtn">
          <i data-lucide="user-plus"></i>
          <span>Buat Akun</span>
        </button>
        <p class="auth-hint">Sudah punya akun? <a href="#" onclick="switchTab('login')">Masuk di sini</a></p>
      </form>

    </div>

    <p class="auth-footer">© 2026 TransaksiKu &bull; Data tersimpan lokal di perangkat Anda</p>
  </div>

  <script src="auth.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
